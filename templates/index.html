<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            margin: 40px auto;
            width: 400px;
            border-radius: 10px;
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🚗 Car Price Prediction</h1>

<form action="/predict" method="post">

    <input type="text" name="model" placeholder="Model (e.g. i20)" required>
    <input type="number" name="vehicle_age" placeholder="Vehicle Age" required>
    <input type="number" name="km_driven" placeholder="KM Driven" required>

    <select name="seller_type">
        <option>Dealer</option>
        <option>Individual</option>
    </select>

    <select name="fuel_type">
        <option>Petrol</option>
        <option>Diesel</option>
        <option>CNG</option>
    </select>

    <select name="transmission_type">
        <option>Manual</option>
        <option>Automatic</option>
    </select>

    <input type="number" name="mileage" placeholder="Mileage" required>
    <input type="number" name="engine" placeholder="Engine CC" required>
    <input type="number" name="max_power" placeholder="Max Power" required>
    <input type="number" name="seats" placeholder="Seats" required>

    <button type="submit">Predict Price</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
